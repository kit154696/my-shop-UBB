<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>ราคาของ Price</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#FFF8F0; --white:#fff; --orange:#E85D04; --orange-lt:#FF6B08;
      --orange-bg:#FFF0E0; --red:#C0392B; --red-bg:#FFF0EE;
      --text:#1A1A1A; --text2:#444; --muted:#888; --border:#E0D8D0;
      --green:#1E8B3C; --radius:16px; --radius-sm:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;
      font-size:17px;line-height:1.6;min-height:100dvh;-webkit-tap-highlight-color:transparent}
    #app{max-width:540px;margin:0 auto;padding-bottom:40px}

    /* ===== Header ===== */
    .app-header{position:sticky;top:0;z-index:100;background:var(--orange);
      padding:12px 16px 0;box-shadow:0 3px 12px rgba(232,93,4,.35)}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .logo{font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:7px}
    .logo-icon{font-size:24px}
    .search-wrap{position:relative;margin-bottom:10px}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--muted);pointer-events:none}
    #searchInput{width:100%;background:#fff;border:none;border-radius:999px;
      padding:12px 44px 12px 46px;font-family:'Noto Sans Thai',sans-serif;
      font-size:17px;font-weight:500;color:var(--text);outline:none}
    #searchInput::placeholder{color:var(--muted)}
    .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);
      background:var(--border);border:none;border-radius:50%;width:28px;height:28px;
      font-size:14px;cursor:pointer;color:var(--text2);display:flex;align-items:center;
      justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .clear-btn.visible{opacity:1;pointer-events:all}

    /* ===== Tab Bar ===== */
    .tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
      border-top:1px solid rgba(255,255,255,.2)}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;background:transparent;border:none;color:rgba(255,255,255,.7);
      font-family:'Noto Sans Thai',sans-serif;font-size:15px;font-weight:700;
      padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;
      transition:color .15s,border-color .15s;white-space:nowrap}
    .tab-btn.active{color:#fff;border-bottom-color:#fff}

    /* ===== List Header ===== */
    .list-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
    .list-title{font-size:18px;font-weight:800}
    .item-count{font-size:14px;font-weight:600;color:var(--muted);background:var(--white);
      border:1.5px solid var(--border);border-radius:999px;padding:2px 12px}

    /* ===== Product List ===== */
    #productList{padding:0 12px;display:flex;flex-direction:column;gap:10px}

    .product-item{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);
      display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;
      transition:border-color .15s,transform .1s;box-shadow:0 2px 6px rgba(0,0,0,.05)}
    .product-item:active{transform:scale(.98);border-color:var(--orange)}

    .item-img{width:64px;height:64px;border-radius:10px;overflow:hidden;
      background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;
      font-size:28px;border:1.5px solid var(--border)}
    .item-img img{width:100%;height:100%;object-fit:cover}

    .item-info{flex:1;min-width:0}
    .item-name{font-size:16px;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .item-prices{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .price-badge{background:var(--orange-bg);color:var(--orange);border-radius:6px;
      padding:2px 10px;font-size:15px;font-weight:800}
    .price-extra-badge{background:#f0f0f0;color:var(--text2);border-radius:6px;
      padding:2px 10px;font-size:13px;font-weight:600}

    .item-tab-tag{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg);
      border:1px solid var(--border);border-radius:999px;padding:1px 8px;margin-top:4px;display:inline-block}

    .item-arrow{color:var(--muted);font-size:20px;flex-shrink:0}

    /* ===== Category Separator ===== */
    .cat-header{padding:16px 16px 6px;font-size:13px;font-weight:800;
      color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
    .cat-header::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ===== Loading / Empty ===== */
    .loading-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 20px;color:var(--muted);font-size:17px}
    .spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-icon{font-size:56px;margin-bottom:12px}
    .empty-title{font-size:18px;font-weight:800;margin-bottom:6px}
    .empty-sub{font-size:15px;color:var(--muted)}

    /* ===== Overlay ===== */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.open{opacity:1;pointer-events:all}

    /* ===== Sheet ===== */
    .sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
      width:100%;max-width:540px;background:var(--white);border-radius:24px 24px 0 0;
      border-top:3px solid var(--border);z-index:201;
      transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:93dvh;
      overflow-y:auto;overscroll-behavior:contain}
    .sheet.open{transform:translateX(-50%) translateY(0)}
    .sheet-handle{width:44px;height:5px;background:var(--border);border-radius:999px;margin:13px auto 0}
    .sheet-header{display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px 4px;border-bottom:2px solid var(--bg)}
    .sheet-title{font-size:20px;font-weight:900}
    .btn-close{background:var(--bg);border:2px solid var(--border);color:var(--text2);
      width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center}
    .btn-close:active{background:var(--border)}
    .sheet-body{padding:18px 20px 30px}

    /* ===== Detail Sheet ===== */
    .detail-img-wrap{width:100%;border-radius:var(--radius);overflow:hidden;
      aspect-ratio:4/3;background:var(--bg);margin-bottom:16px;
      border:2px solid var(--border);position:relative}
    .detail-img-wrap img{width:100%;height:100%;object-fit:cover}
    .detail-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px}

    /* ปุ่มอัปโหลดรูปบนรูป */
    .img-upload-overlay{position:absolute;bottom:0;left:0;right:0;
      background:rgba(0,0,0,.55);padding:10px;text-align:center;cursor:pointer}
    .img-upload-overlay label{color:#fff;font-size:15px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px}
    .img-upload-overlay input{display:none}

    .detail-name{font-size:22px;font-weight:900;margin-bottom:12px;line-height:1.3}

    /* กล่องราคา */
    .price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:10px;margin-bottom:20px}
    .price-card{background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);
      padding:12px 14px;text-align:center}
    .price-card.main{background:var(--orange-bg);border-color:var(--orange)}
    .price-card-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
    .price-card-value{font-size:22px;font-weight:900;color:var(--text)}
    .price-card.main .price-card-value{color:var(--orange)}

    /* คำนวณ */
    .calc-box{background:var(--bg);border:2.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .calc-title{font-size:17px;font-weight:800;color:var(--text2);margin-bottom:14px}
    .qty-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .qty-label{font-size:15px;font-weight:700;color:var(--text2);white-space:nowrap;flex-shrink:0}
    .qty-controls{display:flex;align-items:center;flex:1;border:2.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--white)}
    .qty-btn{background:var(--bg);border:none;color:var(--text);font-size:26px;font-weight:700;width:52px;height:52px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .qty-btn:active{background:var(--border)}
    #qtyInput{flex:1;border:none;border-left:2px solid var(--border);border-right:2px solid var(--border);background:var(--white);font-family:'Noto Sans Thai',sans-serif;font-size:26px;font-weight:900;color:var(--text);text-align:center;padding:8px 4px;outline:none;min-width:0}
    .total-box{background:var(--orange);border-radius:var(--radius-sm);padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
    .total-label{font-size:17px;font-weight:700;color:rgba(255,255,255,.85)}
    .total-value{font-size:30px;font-weight:900;color:#fff}

    /* Progress อัปโหลด */
    .upload-progress{background:var(--orange-bg);border:2px solid var(--orange);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px;display:none}
    .upload-progress.show{display:flex}
    .upload-progress .prog-text{font-size:15px;font-weight:700;color:var(--orange)}

    /* ===== Toast ===== */
    #toastContainer{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:500;width:calc(100% - 32px);max-width:500px;display:flex;flex-direction:column;gap:10px;pointer-events:none}
    .toast{background:var(--white);border-left:6px solid var(--green);border-radius:var(--radius-sm);padding:14px 18px;display:flex;align-items:center;gap:12px;font-size:17px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:toastIn .3s ease both;pointer-events:all}
    .toast.error{border-color:var(--red)}
    @keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}
    .toast-icon{font-size:22px;flex-shrink:0}
  </style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-top">
      <div class="logo"><span class="logo-icon">🏪</span>ราคาของ Price</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="ค้นหาชื่อสินค้า…" autocomplete="off"/>
      <button class="clear-btn" id="clearSearch">✕</button>
    </div>
    <div class="tab-bar" id="tabBar">
      <!-- tabs injected -->
    </div>
  </header>

  <div class="list-header">
    <div class="list-title" id="listTitle">สินค้าทั้งหมด</div>
    <div class="item-count" id="itemCount">0 รายการ</div>
  </div>

  <div id="productList"></div>
  <div id="toastContainer"></div>
</div>

<div class="overlay" id="overlay"></div>

<!-- Detail Sheet -->
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 class="sheet-title">รายละเอียด</h2>
    <button class="btn-close" id="closeDetail">✕</button>
  </div>
  <div class="sheet-body" id="detailBody"></div>
</div>

<script>
/* ================================================================
   ⚙️  วาง URL Apps Script ตรงนี้
   (Deploy ใหม่หลังจากอัปเดตโค้ด Apps Script)
================================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycby2fss7YruA0yyeynbCcq6HV61Mr9H_gIm9yTT_wxjp2Xr5X5Ez-WufZqCGjCjkJvbk/exec';

/* ชื่อ Tab ใน Sheet และชื่อแสดงในแอป
   ถ้าชื่อ Tab ต่างออกไป ให้แก้ตรงนี้เลย */
const TAB_LABELS = {
  'ทั้งหมด':     'ทั้งหมด',
  'List ขวด':    'ขวด',
  'List ไวทัพย์': 'ไวทัพย์',
  'List แป้ง':   'แป้ง',
  'List แกลลอน': 'แกลลอน',
};

/* ================================================================ */

const fmt = n => '฿' + Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

let allData = {};      // { tabName: [products] }
let flatProducts = []; // all products with .tab
let currentTab = 'ทั้งหมด';
let currentProduct = null;

/* DOM */
const productList = document.getElementById('productList');
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearSearch');
const itemCount   = document.getElementById('itemCount');
const listTitle   = document.getElementById('listTitle');
const tabBar      = document.getElementById('tabBar');
const overlay     = document.getElementById('overlay');
const detailSheet = document.getElementById('detailSheet');
const detailBody  = document.getElementById('detailBody');
const closeDetail = document.getElementById('closeDetail');
const toastCont   = document.getElementById('toastContainer');

/* ---- Toast ---- */
function toast(msg, type='success') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  toastCont.appendChild(el);
  setTimeout(() => { el.style.animation='toastOut .3s ease forwards'; setTimeout(()=>el.remove(),320); }, 3200);
}

/* ---- Sheet ---- */
function openSheet(s) { overlay.classList.add('open'); s.classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(s) { overlay.classList.remove('open'); s.classList.remove('open'); document.body.style.overflow=''; }
overlay.addEventListener('click', () => closeSheet(detailSheet));
closeDetail.addEventListener('click', () => closeSheet(detailSheet));

/* ---- โหลดข้อมูล ---- */
async function fetchProducts() {
  productList.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>กำลังโหลดข้อมูล…</span></div>`;
  try {
    const res = await fetch(`${API_URL}?action=getProducts`, { cache:'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allData = data.tabs || {};
    flatProducts = [];
    Object.entries(allData).forEach(([tab, prods]) => {
      prods.forEach(p => flatProducts.push({ ...p, tab }));
    });

    buildTabs();
    renderList(getFiltered());
  } catch(e) {
    productList.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">โหลดข้อมูลไม่ได้</div><div class="empty-sub">${e.message}</div></div>`;
    itemCount.textContent = '0 รายการ';
  }
}

/* ---- สร้าง Tab Bar ---- */
function buildTabs() {
  const tabs = ['ทั้งหมด', ...Object.keys(allData)];
  tabBar.innerHTML = tabs.map(t => `
    <button class="tab-btn ${t===currentTab?'active':''}" data-tab="${t}">
      ${TAB_LABELS[t] || t}
    </button>
  `).join('');

  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      listTitle.textContent = TAB_LABELS[currentTab] || currentTab;
      renderList(getFiltered());
    });
  });
}

/* ---- กรองข้อมูล ---- */
function getFiltered() {
  const q = searchInput.value.trim().toLowerCase();
  let list = currentTab === 'ทั้งหมด' ? flatProducts : (allData[currentTab] || []).map(p => ({...p, tab: currentTab}));
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q));
  return list;
}

/* ---- แสดงรายการ ---- */
function renderList(products) {
  itemCount.textContent = `${products.length} รายการ`;
  if (!products.length) {
    productList.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">ไม่พบสินค้า</div><div class="empty-sub">ลองพิมพ์คำอื่น</div></div>`;
    return;
  }

  // ถ้าแสดงทั้งหมด ให้แบ่งกลุ่มตาม tab
  if (currentTab === 'ทั้งหมด' && !searchInput.value.trim()) {
    let html = '';
    Object.entries(allData).forEach(([tab, prods]) => {
      if (!prods.length) return;
      html += `<div class="cat-header">${TAB_LABELS[tab] || tab}</div>`;
      html += prods.map((p, i) => productItemHTML({...p, tab}, `${tab}__${i}`)).join('');
    });
    productList.innerHTML = html;
  } else {
    productList.innerHTML = products.map((p, i) => productItemHTML(p, i)).join('');
  }

  productList.querySelectorAll('.product-item').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.tab;
      const row = +el.dataset.row;
      const p = (allData[tab] || []).find(x => x.row === row);
      if (p) openDetail({...p, tab});
    });
  });
}

function productItemHTML(p, key) {
  const imgHtml = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy" onerror="this.parentNode.innerHTML='📦'" />`
    : '📦';
  const extraHtml = p.price_extra
    ? `<span class="price-extra-badge">${esc(p.price_extra_label||'พิเศษ')} ${fmt(p.price_extra)}</span>`
    : '';
  return `
    <div class="product-item" data-tab="${esc(p.tab)}" data-row="${p.row}">
      <div class="item-img">${imgHtml}</div>
      <div class="item-info">
        <div class="item-name">${esc(p.name)}</div>
        <div class="item-prices">
          <span class="price-badge">${fmt(p.price_unit)}</span>
          ${extraHtml}
        </div>
        ${currentTab==='ทั้งหมด' && searchInput.value ? `<span class="item-tab-tag">${TAB_LABELS[p.tab]||p.tab}</span>` : ''}
      </div>
      <span class="item-arrow">›</span>
    </div>`;
}

/* ---- ค้นหา ---- */
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.classList.toggle('visible', q.length > 0);
  renderList(getFiltered());
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  renderList(getFiltered());
  searchInput.focus();
});

/* ---- รายละเอียดสินค้า ---- */
function openDetail(p) {
  currentProduct = p;

  const imgContent = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" id="detailImg" onerror="this.src=''" />`
    : `<div class="detail-img-placeholder">📦</div>`;

  const priceCards = [
    `<div class="price-card main"><div class="price-card-label">ราคา/หน่วย</div><div class="price-card-value">${fmt(p.price_unit)}</div></div>`
  ];
  if (p.price_extra) {
    priceCards.push(`<div class="price-card"><div class="price-card-label">${esc(p.price_extra_label||'ราคาพิเศษ')}</div><div class="price-card-value">${fmt(p.price_extra)}</div></div>`);
  }

  detailBody.innerHTML = `
    <div class="detail-img-wrap">
      ${imgContent}
      <div class="img-upload-overlay">
        <label>
          <input type="file" id="imgFileInput" accept="image/*" capture="environment"/>
          📷 ${p.image_url ? 'เปลี่ยนรูป' : 'เพิ่มรูป'}
        </label>
      </div>
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="spinner" style="width:24px;height:24px;border-width:3px"></div>
      <span class="prog-text">กำลังอัปโหลดรูป…</span>
    </div>

    <div class="detail-name">${esc(p.name)}</div>

    <div class="price-grid">${priceCards.join('')}</div>

    <div class="calc-box">
      <div class="calc-title">🧮 คำนวณราคา</div>
      <div class="qty-row">
        <span class="qty-label">จำนวน</span>
        <div class="qty-controls">
          <button class="qty-btn" id="qtyMinus">−</button>
          <input type="number" id="qtyInput" value="1" min="1" inputmode="numeric"/>
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
      </div>
      <div class="total-box">
        <span class="total-label">ราคารวม</span>
        <span class="total-value" id="totalValue">${fmt(p.price_unit)}</span>
      </div>
    </div>
  `;

  /* คำนวณ */
  const qi   = document.getElementById('qtyInput');
  const tv   = document.getElementById('totalValue');
  const unit = parseFloat(p.price_unit) || 0;
  function upd() { const q=Math.max(1,parseInt(qi.value)||1); qi.value=q; tv.textContent=fmt(unit*q); }
  qi.addEventListener('input', upd);
  document.getElementById('qtyMinus').addEventListener('click', ()=>{if((+qi.value||1)>1){qi.value--;upd();}});
  document.getElementById('qtyPlus').addEventListener('click', ()=>{qi.value=(+qi.value||1)+1;upd();});

  /* อัปโหลดรูป */
  document.getElementById('imgFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await uploadImage(file, p);
  });

  openSheet(detailSheet);
}

/* ---- อัปโหลดรูปภาพ ---- */
async function uploadImage(file, p) {
  const prog = document.getElementById('uploadProgress');
  if (prog) prog.classList.add('show');

  try {
    const b64 = await toB64(file);
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'updateImage',
        tab: p.tab,
        row: p.row,
        productName: p.name,
        imageBase64: b64.split(',')[1],
        imageMimeType: file.type
      })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

    /* อัปเดต local data */
    const localP = (allData[p.tab] || []).find(x => x.row === p.row);
    if (localP) localP.image_url = data.imageUrl;
    currentProduct.image_url = data.imageUrl;

    /* อัปเดตรูปในหน้า */
    const detailImgWrap = document.querySelector('.detail-img-wrap');
    const existing = document.getElementById('detailImg');
    if (existing) {
      existing.src = data.imageUrl;
    } else {
      const placeholder = detailImgWrap.querySelector('.detail-img-placeholder');
      if (placeholder) {
        const img = document.createElement('img');
        img.src = data.imageUrl;
        img.alt = p.name;
        img.id = 'detailImg';
        placeholder.replaceWith(img);
      }
    }

    /* เปลี่ยน label ปุ่ม */
    const label = document.querySelector('.img-upload-overlay label');
    if (label) { const t = label.childNodes[label.childNodes.length-1]; if(t) t.textContent=' เปลี่ยนรูป'; }

    /* อัปเดตรายการ */
    renderList(getFiltered());
    toast('อัปโหลดรูปสำเร็จ! 📷');
  } catch(e) {
    toast(`อัปโหลดไม่สำเร็จ: ${e.message}`, 'error');
  } finally {
    if (prog) prog.classList.remove('show');
  }
}

function toB64(f) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('อ่านไฟล์ไม่ได้'));r.readAsDataURL(f);});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

fetchProducts();
</script>
